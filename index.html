<!DOCTYPE html>
<html>
<head>
<title>منصتي التعليمية</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: #0f172a;
  color:white;
}

/* الهيدر */
.header{
  background: linear-gradient(90deg,#2563eb,#1e3a8a);
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* الحاوية */
.container{
  padding:20px;
  text-align:center;
}

/* الكارت */
.card{
  background: #1e293b;
  width:300px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform: scale(1.05);
}

/* الأزرار */
.btn{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
  margin:5px;
  font-weight:bold;
}

.blue{background:#3b82f6;}
.green{background:#22c55e;}
.red{background:#ef4444;}

.btn:hover{
  opacity:0.8;
}

/* الفيديو */
video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="header">
🎓 منصتي التعليمية
</div>

<div class="container">

<!-- الصفحة الرئيسية -->
<div id="home">

  <div class="card">
    <h2>👋 أهلا بيك</h2>
    <p>ابدأ رحلتك في التعلم الآن</p>
    <button class="btn blue" onclick="showCourses()">📚 الكورسات</button>
  </div>

</div>

<!-- الكورسات -->
<div id="courses" style="display:none;">

  <div class="card">
    <h3>📘 كورس الأساسيات</h3>
    <p>تعلم البرمجة من الصفر</p>
    <button class="btn green" onclick="showLesson()">ابدأ الدرس</button>
  </div>

  <button class="btn red" onclick="backHome()">⬅ رجوع</button>

</div>

<!-- الدرس -->
<div id="lesson" style="display:none;">

  <div class="card">
    <h3>🎥 الدرس الأول</h3>

    <video controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

  <button class="btn red" onclick="showCourses()">⬅ رجوع للكورسات</button>

</div>

</div>

<script>

function showCourses(){
  document.getElementById("home").style.display="none";
  document.getElementById("courses").style.display="block";
  document.getElementById("lesson").style.display="none";
}

function showLesson(){
  document.getElementById("home").style.display="none";
  document.getElementById("courses").style.display="none";
  document.getElementById("lesson").style.display="block";
}

function backHome(){
  document.getElementById("home").style.display="block";
  document.getElementById("courses").style.display="none";
  document.getElementById("lesson").style.display="none";
}

</script>

</body>
</html>
